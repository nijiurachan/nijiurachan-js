name: mainをdevまで進める

on:
  workflow_dispatch:
    inputs:
      fast_forward:
        description: 'マージコミットを作らない'
        required: false
        type: boolean
        default: true
      dry_run:
        description: '練習モード'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: main-update
  cancel-in-progress: false

jobs:
  merge:
    name: mainにdevをマージ
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch dev branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin refs/heads/dev:refs/remotes/origin/dev

      - name: Merge dev into main (fast-forward)
        if: ${{ inputs.fast_forward }}
        run: git merge --ff-only origin/dev

      - name: Merge dev into main (non-fast-forward)
        if: ${{ !inputs.fast_forward }}
        run: git merge --no-ff --no-edit origin/dev

      - name: Push changes to main
        if: ${{ !inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git push origin HEAD:main
